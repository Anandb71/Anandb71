<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anand B profile header</title>
  <desc id="desc">Founder at getarbor.dev, building graph-native AI tooling and local-first systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070A"/>
      <stop offset="0.45" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#071D2F"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="140" y1="326" x2="1040" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#58A6FF"/>
      <stop offset="0.62" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="name" x1="178" y1="148" x2="614" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#D6EAFF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(885 187) rotate(90) scale(148)">
      <stop stop-color="#58A6FF" stop-opacity="0.38"/>
      <stop offset="0.56" stop-color="#1F6FEB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#30363D" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#grid)"/>
  <circle cx="930" cy="160" r="250" fill="url(#pulse)"/>
  <path d="M0 338C150 310 274 346 425 318C605 285 745 266 918 306C1035 333 1124 335 1200 314V420H0V338Z" fill="#58A6FF" fill-opacity="0.05"/>

  <g opacity="0.72" filter="url(#softGlow)">
    <path d="M802 224L874 132L980 178L1038 98" stroke="#58A6FF" stroke-width="2.5"/>
    <path d="M802 224L930 256L980 178" stroke="#7DD3FC" stroke-opacity="0.62" stroke-width="2"/>
    <path d="M874 132L930 256L1038 98" stroke="#238636" stroke-opacity="0.48" stroke-width="2"/>
    <circle cx="802" cy="224" r="8" fill="#7DD3FC"/>
    <circle cx="874" cy="132" r="8" fill="#58A6FF"/>
    <circle cx="980" cy="178" r="8" fill="#F2CC60"/>
    <circle cx="1038" cy="98" r="8" fill="#7DD3FC"/>
    <circle cx="930" cy="256" r="8" fill="#238636"/>
  </g>

  <g opacity="0.78">
    <rect x="755" y="278" width="338" height="64" rx="18" fill="#0D1117" fill-opacity="0.74" stroke="#30363D"/>
    <text x="781" y="305" fill="#8B949E" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" letter-spacing="1.8">CURRENT VECTOR</text>
    <text x="781" y="329" fill="#E6EDF3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">deterministic agents + code graphs</text>
  </g>

  <g>
    <rect x="80" y="74" width="238" height="34" rx="17" fill="#0D1117" stroke="#30363D"/>
    <circle cx="101" cy="91" r="5" fill="#238636"/>
    <text x="116" y="97" fill="#E6EDF3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Founder @getarbor.dev</text>

    <text x="78" y="181" fill="url(#name)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="78" font-weight="800" letter-spacing="0">Anand B</text>
    <text x="82" y="224" fill="#9FB3C8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="600">Graph-native AI tooling, local-first systems, and cinematic developer UX.</text>
    <text x="82" y="263" fill="#8B949E" font-family="JetBrains Mono,Consolas,monospace" font-size="17">code intelligence / agent observability / Rust / Flutter / MCP</text>
  </g>

  <rect x="82" y="325" width="1010" height="2" fill="url(#blueLine)"/>
  <g font-family="JetBrains Mono,Consolas,monospace" font-size="14" fill="#8B949E">
    <text x="82" y="365">builds systems that explain themselves</text>
    <text x="758" y="365">github.com/Anandb71</text>
  </g>
