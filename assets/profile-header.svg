  <text x="119" y="73" fill="#E6EDF3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Cofounder - www.getarbor.dev</text>

  <text x="78" y="142" fill="url(#name)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="72" font-weight="850">Anand B</text>
  <text x="82" y="184" fill="#B8C7D9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="650">Build the machine. Make it explain itself.</text>
  <text x="82" y="218" fill="#8B949E" font-family="JetBrains Mono,Consolas,monospace" font-size="15">graph-native AI tooling / Rust / MCP / local-first systems</text>

