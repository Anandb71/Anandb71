<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anand B</title>
  <desc id="desc">Cofounder at www.getarbor.dev. Building graph-native AI tooling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070A"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#071C2E"/>
    </linearGradient>
    <linearGradient id="name" x1="88" y1="130" x2="438" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#30363D" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" rx="28" fill="url(#bg)"/>
